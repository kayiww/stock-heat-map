name: Update A-share board heat dashboard

on:
  schedule:
    - cron: "35 7 * * 1-5"
    - cron: "10 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dashboard-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build static dashboard
        run: python scripts/build_static.py --config boards.yml --output docs --history-days 30 --timeout 20 --retries 3 --request-pause 0.2

      - name: Persist generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          if ! git diff --cached --quiet; then
            git commit -m "Update board heat dashboard data [skip ci]"
            git push
          fi

      - name: Send Telegram summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SITE_URL: https://kayiww.github.io/stock-heat-map/
        run: python scripts/send_telegram.py --latest docs/data/latest.json
